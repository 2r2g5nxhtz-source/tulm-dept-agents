version: '3.8'

services:
  finance-bot:
    build: .
    env_file: .env
    environment:
      - PG_CONNECTION_STRING=postgresql://finbot:finbot2026@postgres-finance:5432/finbot_db
      - REDIS_URL=redis://redis-finance:6379/0
      - DEPT_MODE=finance
      - LLM_MODEL=llama-3.3-70b-versatile
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
    depends_on:
      postgres-finance:
        condition: service_healthy
      redis-finance:
        condition: service_started
    restart: unless-stopped
    networks:
      - finance-net

  postgres-finance:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_USER=finbot
      - POSTGRES_PASSWORD=finbot2026
      - POSTGRES_DB=finbot_db
    volumes:
      - postgres-finance-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finbot -d finbot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-finance:
    image: redis:7-alpine
    volumes:
      - redis-finance-data:/data
    restart: unless-stopped
    networks:
      - finance-net

  ves-bot:
    build: .
    env_file: .env.ves
    environment:
      - PG_CONNECTION_STRING=postgresql://vesbot:vesbot2026@postgres-ves:5432/vesbot_db
      - REDIS_URL=redis://redis-ves:6379/0
      - DEPT_MODE=ves
      - LLM_MODEL=llama-3.3-70b-versatile
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
    depends_on:
      postgres-ves:
        condition: service_healthy
      redis-ves:
        condition: service_started
    restart: unless-stopped
    networks:
      - ves-net

  postgres-ves:
