      - REDIS_URL=redis://redis-railway:6379/0
      - DEPT_MODE=railway
      - LLM_MODEL=llama-3.3-70b-versatile
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
    depends_on:
      postgres-railway:
        condition: service_healthy
      redis-railway:
        condition: service_started
    restart: unless-stopped
    networks:
      - railway-net

  postgres-railway:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_USER=railbot
      - POSTGRES_PASSWORD=railbot2026
      - POSTGRES_DB=railbot_db
    volumes:
      - postgres-railway-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
