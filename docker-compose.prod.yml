networks:
  finance-net:
    driver: bridge
  ves-net:
    driver: bridge
  railway-net:
    driver: bridge
  maritime-net:
    driver: bridge

volumes:
  postgres-finance-data:
  redis-finance-data:
  postgres-ves-data:
  redis-ves-data:
  postgres-railway-data:
  redis-railway-data:
  postgres-maritime-data:
  redis-maritime-data:
