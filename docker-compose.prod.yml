    networks:
      - ves-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vesbot -d vesbot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-ves:
    image: redis:7-alpine
    volumes:
      - redis-ves-data:/data
    restart: unless-stopped
    networks:
      - ves-net

  railway-bot:
