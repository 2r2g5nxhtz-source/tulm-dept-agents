version: '3.8'

services:
  deploy-bot:
    build: ./deploy_bot
    env_file: .env.deploy-bot
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/tulm-dept-agents:/repo
    environment:
      - WEBHOOK_PORT=9999
      - REPO_DIR=/repo
      - COMPOSE_FILE=/repo/docker-compose.prod.yml
    ports:
      - "9999:9999"
    restart: unless-stopped

  finance-bot:
    build: .
    env_file: .env
    environment:
      - REDIS_URL=redis://redis-finance:6379/0
      - DEPT_MODE=finance
      - LLM_MODEL=llama-3.3-70b-versatile
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
    depends_on:
      postgres-finance:
        condition: service_healthy
      redis-finance:
        condition: service_started
    restart: unless-stopped
    networks:
      - finance-net

  postgres-finance:
    image: ankane/pgvector:latest
    env_file: .env
    environment:
      - POSTGRES_USER=finbot
      - POSTGRES_DB=finbot_db
    volumes:
      - postgres-finance-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finbot -d finbot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-finance:
    image: redis:7-alpine
    volumes:
      - redis-finance-data:/data
    restart: unless-stopped
    networks:
      - finance-net

  ves-bot:
    build: .
    env_file: .env.ves
    environment:
      - REDIS_URL=redis://redis-ves:6379/0
      - DEPT_MODE=ves
      - LLM_MODEL=qwen/qwen3-32b
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
    depends_on:
      postgres-ves:
        condition: service_healthy
      redis-ves:
        condition: service_started
    restart: unless-stopped
    networks:
      - ves-net

  postgres-ves:
    image: ankane/pgvector:latest
    env_file: .env.ves
    environment:
      - POSTGRES_USER=vesbot
      - POSTGRES_DB=vesbot_db
    volumes:
      - postgres-ves-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ves-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vesbot -d vesbot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-ves:
    image: redis:7-alpine
    volumes:
      - redis-ves-data:/data
    restart: unless-stopped
    networks:
      - ves-net

  railway-bot:
    build: .
    env_file: .env.railway
    environment:
      - REDIS_URL=redis://redis-railway:6379/0
      - DEPT_MODE=railway
      - LLM_MODEL=llama-3.3-70b-versatile
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
    depends_on:
      postgres-railway:
        condition: service_healthy
      redis-railway:
        condition: service_started
    restart: unless-stopped
    networks:
      - railway-net

  postgres-railway:
    image: ankane/pgvector:latest
    env_file: .env.railway
    environment:
      - POSTGRES_USER=railbot
      - POSTGRES_DB=railbot_db
    volumes:
      - postgres-railway-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - railway-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railbot -d railbot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-railway:
    image: redis:7-alpine
    volumes:
      - redis-railway-data:/data
    restart: unless-stopped
    networks:
      - railway-net

  maritime-bot:
    build: .
    env_file: .env.maritime
    environment:
      - REDIS_URL=redis://redis-maritime:6379/0
      - DEPT_MODE=maritime
      - LLM_MODEL=llama-3.3-70b-versatile
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
    depends_on:
      postgres-maritime:
        condition: service_healthy
      redis-maritime:
        condition: service_started
    restart: unless-stopped
    networks:
      - maritime-net

  postgres-maritime:
    image: ankane/pgvector:latest
    env_file: .env.maritime
    environment:
      - POSTGRES_USER=maritimebot
      - POSTGRES_DB=maritime_db
    volumes:
      - postgres-maritime-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - maritime-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maritimebot -d maritime_db"]
