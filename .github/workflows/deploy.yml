name: Deploy to Hetzner

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          curl -f --connect-timeout 30 \
            "http://178.104.81.174:9999/deploy?token=${{ secrets.WEBHOOK_SECRET }}" \
            && echo "Deploy triggered successfully" \
            || echo "Webhook not available yet - deploy manually"
